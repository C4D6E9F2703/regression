version: 0.1
component: build
timeoutInSeconds: 600
shell: bash

steps:
  - type: Command
    name: "Install Maven and Run Tests"
    command: |
      mvn clean test
    onFailure:
      - type: Command
        command: |
          echo "Regression Tests Failed!"

outputArtifacts:
  - name: test_report
    type: BINARY
    location: target/surefire-reports/