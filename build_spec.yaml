version: 0.1
component: build
timeoutInSeconds: 600
shell: bash

steps:
  - type: Command
    name: "Install Maven and Run Tests"
    command: |
      # Use 'package' to ensure the JAR file and reports are both created
      mvn clean package -DskipTests=false 
    onFailure:
      - type: Command
        command: |
          echo "Regression Tests Failed!"

outputArtifacts:
  - name: test_report
    type: BINARY 
    # This matches the pattern the system is looking for
    location: target/*.jar
